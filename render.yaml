# Render Blueprint — deploy JoinCloud Admin as a Web Service
# Docs: https://render.com/docs/blueprint-spec
#
# Option A: Native Node (no Docker)
#   - Connect repo, select this blueprint, add env vars, deploy.
# Option B: Docker
#   - In Render dashboard create Web Service → connect repo → set "Docker" as environment.

services:
  - type: web
    name: joincloud-admin
    runtime: node
    region: oregon

    buildCommand: npm ci && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      # JWT_SECRET, RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET, STRIPE_SECRET_KEY,
      # STRIPE_WEBHOOK_SECRET, RAZORPAY_WEBHOOK_SECRET, SMTP_HOST, SMTP_PORT,
      # SMTP_USER, SMTP_PASS, MAIL_FROM, JOINCLOUD_WEB_URL,
      # JOINCLOUD_ACTIVATION_SECRET — set these in the Render dashboard.
