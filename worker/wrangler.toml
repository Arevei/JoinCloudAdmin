name = "joincloud-share-proxy"
main = "index.js"
compatibility_date = "2024-01-01"

routes = [
  { pattern = "go.joincloud.cloud/s/*", zone_name = "joincloud.cloud" }
]

[vars]
CONTROL_PLANE = "https://plane.joincloud.in"

# R2 bucket — stores cached files served to concurrent downloaders
# Requires Workers Paid plan. Re-enable once plan is active.
# Create with: wrangler r2 bucket create joincloud-share-cache
[[r2_buckets]]
binding = "joincloud_share_cache"
bucket_name = "joincloud-share-cache"

# KV namespace — tracks concurrent request count per share link
# Create with: wrangler kv:namespace create "CONCURRENT_KV"
# Then fill in the id and preview_id below
[[kv_namespaces]]
binding = "CONCURRENT_KV"
id = "1e372e2bcdd24d3590c2c59501fc00fd"
preview_id = "1e372e2bcdd24d3590c2c59501fc00fd"
